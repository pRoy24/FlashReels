  <path d="M732 262C768 330 794 400 806 472C818 544 840 604 890 648" stroke="#6db5ff" stroke-opacity="0.28" stroke-width="2"/>
  <path d="M700 322C752 378 786 438 800 502C814 566 844 610 908 636" stroke="#60d394" stroke-opacity="0.24" stroke-width="2"/>
